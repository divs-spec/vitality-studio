version: '3.8'
services:
  backend:
    build: ./backend
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
    environment:
      - VITALITY_EXECUTOR_URL=http://execution:9000/execute

  execution:
    build: ./execution_engine
    command: uvicorn execution_engine.runner:app --host 0.0.0.0 --port 9000
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    image: node:18-alpine
    working_dir: /app/frontend
    volumes:
      - ../frontend:/app/frontend:rw
      - /app/frontend/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      - VITALITY_BACKEND_URL=http://host.docker.internal:8000

  monitoring:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
