name: CI

# Note: GitHub Actions maintainers deprecated Node.js 20 on hosted runners.
# Some actions may warn when built for Node 20 but run on Node 24. We bump
# action majors where possible to avoid the warning. This change is cosmetic;
# workflows continue to function on Node 24.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run unit tests
        run: |
          python -m unittest discover -v

  build-docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - name: Build backend image
        run: docker build -t vitality-backend:ci ./backend
      - name: Build execution image
        run: docker build -t vitality-execution:ci ./execution_engine
